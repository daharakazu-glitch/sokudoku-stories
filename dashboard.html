<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - 速読英単語</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="robots" content="noindex, nofollow">
    
    <script>
        const pass = sessionStorage.getItem('authorized');
        if (pass !== 'nankou') {
            let input = prompt("このページは限定公開です。パスワードを入力してください：");
            if (input === 'nankou') {
                sessionStorage.setItem('authorized', 'nankou');
            } else {
                document.documentElement.innerHTML = "<body style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#f8fafc;'><div style='text-align:center;'><h1 style='color:#ef4444; font-size: 2rem; margin-bottom: 10px;'>Access Denied</h1><p style='color:#475569;'>正しいパスワードが入力されませんでした。</p><button onclick='location.reload()' style='margin-top:20px; padding:10px 20px; cursor:pointer; background:#3b82f6; color:white; border:none; border-radius:5px; font-weight:bold;'>再入力する</button></div></body>";
                throw new Error("Unauthorized");
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNrvDMnlN_geijgRguQrolnTIZ_rdZwyw",
            authDomain: "sokudoku-stories-db.firebaseapp.com",
            projectId: "sokudoku-stories-db",
            storageBucket: "sokudoku-stories-db.firebasestorage.app",
            messagingSenderId: "979353290932",
            appId: "1:979353290932:web:f0c512cfbe64a7afe36fe1",
            measurementId: "G-XCM39MNG46"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const contentDiv = document.getElementById('dashboard-content');
        const loadingDiv = document.getElementById('loading');
        const tbody = document.getElementById('student-table-body');

        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                contentDiv.classList.remove('hidden');
                await loadDashboardData();
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                contentDiv.classList.add('hidden');
            }
        });

        async function loadDashboardData() {
            loadingDiv.classList.remove('hidden');
            tbody.innerHTML = '';
            
            try {
                const usersSnap = await getDocs(collection(db, "users"));
                let students = [];

                for (const userDoc of usersSnap.docs) {
                    const profile = userDoc.data();
                    const uid = userDoc.id;
                    
                    // Fetch their stories collection
                    const storiesSnap = await getDocs(collection(db, "users", uid, "stories"));
                    
                    let totalCheckedWords = 0;
                    let storiesStarted = storiesSnap.size;
                    let scores = [];
                    
                    storiesSnap.forEach(storyDoc => {
                        const sData = storyDoc.data();
                        if (sData.selectedIds) {
                            totalCheckedWords += sData.selectedIds.length;
                        }
                        if (sData.pronunciationScores) {
                            Object.values(sData.pronunciationScores).forEach(score => {
                                if (typeof score === 'number') scores.push(score);
                            });
                        }
                    });

                    let avgScore = 0;
                    if (scores.length > 0) {
                        const sum = scores.reduce((a, b) => a + b, 0);
                        avgScore = Math.round(sum / scores.length);
                    }

                    students.push({
                        name: profile.displayName || 'Unknown',
                        email: profile.email || 'No email',
                        photo: profile.photoURL || 'https://via.placeholder.com/40',
                        lastLogin: profile.lastLogin ? new Date(profile.lastLogin).toLocaleString() : 'Never',
                        storiesStarted,
                        totalCheckedWords,
                        avgScore,
                        totalPronunciations: scores.length
                    });
                }

                // Sort by most checked words
                students.sort((a, b) => b.totalCheckedWords - a.totalCheckedWords);

                loadingDiv.classList.add('hidden');
                renderTable(students);

            } catch (error) {
                console.error("Error fetching data", error);
                loadingDiv.innerHTML = `<p class="text-red-500 font-bold">Error loading statistics: ${error.message}</p>`;
            }
            lucide.createIcons();
        }

        function renderTable(students) {
            tbody.innerHTML = students.map((s, i) => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="py-4 px-4 text-center text-slate-400 font-bold">${i + 1}</td>
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <img src="${s.photo}" class="w-10 h-10 rounded-full border border-slate-200">
                            <div>
                                <div class="font-bold text-slate-800">${s.name}</div>
                                <div class="text-xs text-slate-500">${s.email}</div>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <span class="inline-block bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-full text-sm">
                            ${s.storiesStarted} stories
                        </span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <span class="font-bold text-lg text-slate-700">${s.totalCheckedWords} <span class="text-xs text-slate-400 font-normal">words</span></span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <div class="flex flex-col items-center">
                            <span class="font-bold text-lg ${s.avgScore >= 80 ? 'text-green-600' : (s.avgScore > 0 ? 'text-orange-500' : 'text-slate-400')}">
                                ${s.avgScore > 0 ? s.avgScore + ' pts' : '-'}
                            </span>
                            <span class="text-xs text-slate-400">${s.totalPronunciations} recordings</span>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-right text-xs text-slate-500">
                        ${s.lastLogin}
                    </td>
                </tr>
            `).join('');
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-indigo-900 text-white p-5 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="bar-chart-2" class="w-8 h-8 text-indigo-300"></i>
                <h1 class="text-2xl font-bold">Teacher Dashboard</h1>
            </div>
            
            <button id="login-btn" class="bg-white text-indigo-900 px-4 py-2 rounded-lg font-bold shadow hover:bg-indigo-50 transition hidden">
                Google ログイン
            </button>
            <button id="logout-btn" class="bg-indigo-800 border border-indigo-700 px-4 py-2 rounded-lg text-sm text-indigo-200 hover:text-white transition hidden">
                Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6 mt-6">
        
        <div id="loading" class="text-center py-20 hidden">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto text-indigo-500 mb-4"></i>
            <p class="text-indigo-900 font-bold animate-pulse">生徒の学習データを集計中...</p>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">Student Progress Leaderboard</h2>
                    <a href="index.html" class="text-sm font-bold text-indigo-600 hover:underline">← アプリ一覧に戻る</a>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-sm uppercase tracking-wider">
                                <th class="py-3 px-4 text-center w-16">Rank</th>
                                <th class="py-3 px-4">Student</th>
                                <th class="py-3 px-4 text-center">Stories Started</th>
                                <th class="py-3 px-4 text-center">Vocabulary Checks</th>
                                <th class="py-3 px-4 text-center">Pronunciation Avg Score</th>
                                <th class="py-3 px-4 text-right">Last Login</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
