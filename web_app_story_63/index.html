<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>速読英単語 必修編 マスターアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css?v=9.1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Times+New+Roman&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Times New Roman"', '"Noto Serif JP"', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDK (ES Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNrvDMnlN_geijgRguQrolnTIZ_rdZwyw",
            authDomain: "sokudoku-stories-db.firebaseapp.com",
            projectId: "sokudoku-stories-db",
            storageBucket: "sokudoku-stories-db.firebasestorage.app",
            messagingSenderId: "979353290932",
            appId: "1:979353290932:web:f0c512cfbe64a7afe36fe1",
            measurementId: "G-XCM39MNG46"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose Firebase services to global scope for script.js
        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseGoogleProvider = new GoogleAuthProvider();
        
        window.firebaseSignIn = () => signInWithPopup(auth, window.firebaseGoogleProvider).catch(e => {
            console.error(e);
            if (e.code === 'auth/unauthorized-domain') {
                alert("【エラー】Firebaseの設定で、このウェブサイトのURLが許可されていません。「承認済みドメイン」に daharakazu-glitch.github.io を追加してください。");
            } else {
                alert("ログインエラー: " + e.message);
            }
        });
        window.firebaseSignOut = () => signOut(auth);
        window.firebaseOnAuthStateChanged = (callback) => onAuthStateChanged(auth, callback);
        window.firebaseDoc = doc;
        window.firebaseSetDoc = setDoc;
        window.firebaseGetDoc = getDoc;
    </script>

    <meta name="robots" content="noindex, nofollow">
    <script>
        const pass = sessionStorage.getItem('authorized');
        if (pass !== 'nankou') {
            let input = prompt("このページは限定公開です。パスワードを入力してください：");
            if (input === 'nankou') {
                sessionStorage.setItem('authorized', 'nankou');
            } else {
                document.documentElement.innerHTML = "<body style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#f8fafc;'><div style='text-align:center;'><h1 style='color:#ef4444; font-size: 2rem; margin-bottom: 10px;'>Access Denied</h1><p style='color:#475569;'>正しいパスワードが入力されませんでした。</p><button onclick='location.reload()' style='margin-top:20px; padding:10px 20px; cursor:pointer; background:#3b82f6; color:white; border:none; border-radius:5px; font-weight:bold;'>再入力する</button></div></body>";
                throw new Error("Unauthorized");
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 font-serif text-xl leading-relaxed">
    <div id="app-root"></div>
    <script src="data.js?v=1774854865"></script>
    <script src="script.js?v=1774854865"></script>
</body>

</html>
