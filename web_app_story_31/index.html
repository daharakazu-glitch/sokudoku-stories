<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>速読英単語 必修編 マスターアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css?v=9.1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Times+New+Roman&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Times New Roman"', '"Noto Serif JP"', 'serif'],
                    }
                }
            }
        }
    </script>

    <meta name="robots" content="noindex, nofollow">
    <script>
        const pass = sessionStorage.getItem('authorized');
        if (pass !== 'nankou') {
            let input = prompt("このページは限定公開です。パスワードを入力してください：");
            if (input === 'nankou') {
                sessionStorage.setItem('authorized', 'nankou');
            } else {
                document.documentElement.innerHTML = "<body style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#f8fafc;'><div style='text-align:center;'><h1 style='color:#ef4444; font-size: 2rem; margin-bottom: 10px;'>Access Denied</h1><p style='color:#475569;'>正しいパスワードが入力されませんでした。</p><button onclick='location.reload()' style='margin-top:20px; padding:10px 20px; cursor:pointer; background:#3b82f6; color:white; border:none; border-radius:5px; font-weight:bold;'>再入力する</button></div></body>";
                throw new Error("Unauthorized");
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 font-serif text-xl leading-relaxed">
    <div id="app-root"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
